name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            echo "First release"
            COMMITS=$(git log --oneline "$CURRENT_TAG")
          else
            COMMITS=$(git log --oneline "$PREV_TAG..$CURRENT_TAG")
          fi

          # Write to file for gh release
          echo "## Changes" > release_notes.md
          echo "" >> release_notes.md
          echo "$COMMITS" | while IFS= read -r line; do
            echo "- $line" >> release_notes.md
          done
          echo "" >> release_notes.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}" >> release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release_notes.md \
            --prerelease || echo "Release already exists, continuing"

  publish:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/gittielabs-agentflow/
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
