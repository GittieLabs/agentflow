site_name: AgentFlow
site_url: https://gittielabs.github.io/agentflow/
site_description: Context engineering framework for multi-agent systems
site_author: GittieLabs

repo_name: GittieLabs/agentflow
repo_url: https://github.com/GittieLabs/agentflow

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Concepts:
      - Context Files: concepts/context-files.md
      - Architecture: concepts/architecture.md
      - LLM Providers: concepts/providers.md
      - Routing: concepts/routing.md
      - Workflows: concepts/workflows.md
      - Sessions & Scratchpads: concepts/sessions.md
      - Memory: concepts/memory.md
      - Tools: concepts/tools.md
      - Events & Telemetry: concepts/events.md
  - Guides:
      - Multi-Agent Pipeline: guides/multi-agent-pipeline.md
      - Foreach Workflow (Resumes): guides/foreach-workflow.md
      - Custom LLM Provider: guides/custom-provider.md
      - Domain Routing: guides/domain-routing.md
  - API Reference:
      - Overview: api/index.md
      - Core Types: api/types.md
      - Config Schemas: api/config.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/GittieLabs/agentflow
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/gittielabs-agentflow/
